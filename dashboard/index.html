<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPredict | Flight Delay ML Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-item-active {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0) 100%);
            border-left: 4px solid #38bdf8;
            color: #38bdf8;
        }
        /* CustomScrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- Sidebar -->
        <aside class="w-64 glass h-full flex flex-col z-20 transition-all duration-300">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                    <i data-lucide="plane" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-outfit text-xl font-bold tracking-tight">AeroPredict</h1>
            </div>

            <nav class="flex-1 mt-4 px-4 space-y-2">
                <button onclick="switchView('overview')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-400" id="nav-overview">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-medium">Overview</span>
                </button>
                <button onclick="switchView('models')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-400" id="nav-models">
                    <i data-lucide="cpu" class="w-5 h-5"></i>
                    <span class="font-medium">Models</span>
                </button>
                <button onclick="switchView('data')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-400" id="nav-data">
                    <i data-lucide="database" class="w-5 h-5"></i>
                    <span class="font-medium">Dataset</span>
                </button>
                <button onclick="switchView('analysis')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-400" id="nav-analysis">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    <span class="font-medium">Analysis</span>
                </button>
                <button onclick="switchView('history')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors text-slate-400" id="nav-history">
                    <i data-lucide="history" class="w-5 h-5"></i>
                    <span class="font-medium">MLOps Tracks</span>
                </button>
            </nav>

            <div class="p-6">
                <div class="bg-gradient-to-br from-sky-500/20 to-indigo-500/20 rounded-2xl p-4 border border-sky-500/20">
                    <p class="text-xs text-sky-400 font-bold uppercase tracking-widest mb-1">Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-sm font-medium">System Ready</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8 relative">
            <!-- Header -->
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl font-outfit font-bold text-white">Dashboard Overview</h2>
                    <p id="view-subtitle" class="text-slate-400">Welcome back. System is ready for flight delay analysis.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 px-4 py-2 glass rounded-full text-sm font-medium">
                        <i data-lucide="calendar" class="w-4 h-4 text-sky-400"></i>
                        <span id="current-date">Mar 1, 2026</span>
                    </div>
                    <button class="p-2 glass rounded-full hover:bg-white/10 transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Views Container -->
            <div id="view-content" class="animate-fade-in">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Notifications Hub -->
    <div id="notification-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script src="app.js"></script>
    <script>
        // Init Lucide
        lucide.createIcons();
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    </script>
</body>
</html>
